<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | KISHORE (25IT161)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --primary: #6366f1;
            --spacing-xl: 3rem;
            --spacing-md: 1.5rem;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            position: relative;
            overflow: hidden;
        }
        
        .error-page::before {
            content: '404';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20rem;
            font-weight: 800;
            color: var(--primary);
            opacity: 0.05;
            z-index: 1;
            pointer-events: none;
        }
        
        .error-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            padding: var(--spacing-xl);
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: var(--spacing-md);
            animation: fadeInUp 0.6s ease;
        }
        
        .error-title {
            font-size: 2rem;
            margin-bottom: var(--spacing-md);
            color: var(--text-primary);
            animation: fadeInUp 0.6s ease 0.2s both;
        }
        
        .error-message {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xl);
            font-size: 1.1rem;
            line-height: 1.6;
            animation: fadeInUp 0.6s ease 0.4s both;
        }
        
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            animation: fadeInUp 0.6s ease 0.6s both;
        }
        
        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }
        
        .home-btn:active {
            transform: translateY(-1px);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .error-page::before {
                font-size: 12rem;
            }
            
            .error-code {
                font-size: 5rem;
            }
            
            .error-title {
                font-size: 1.5rem;
            }
            
            .error-message {
                font-size: 1rem;
                padding: 0 1rem;
            }
            
            .error-content {
                padding: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .error-page::before {
                font-size: 8rem;
            }
            
            .error-code {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <a href="/kish.github.io/" class="home-btn" aria-label="Return to home page">
                <i class="fas fa-home" aria-hidden="true"></i>
                <span>Back to Home</span>
            </a>
        </div>
    </div>
</body>
</html>
