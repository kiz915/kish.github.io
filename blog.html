<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - KISHORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/darkmode.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="/">KISHORE</a>
            </div>
            <div class="nav-menu" id="navMenu">
                <ul class="nav-links">
                    <li><a href="/#home" class="nav-link">Home</a></li>
                    <li><a href="/#about" class="nav-link">About</a></li>
                    <li><a href="/#skills" class="nav-link">Skills</a></li>
                    <li><a href="/#projects" class="nav-link">Projects</a></li>
                    <li><a href="/#certifications" class="nav-link">Certifications</a></li>
                    <li><a href="/blog.html" class="nav-link active">Blog</a></li>
                    <li><a href="/#contact" class="nav-link">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <button id="themeToggle" class="theme-toggle">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="/secure-cloud.html" class="btn btn-outline btn-sm">
                        <i class="fas fa-cloud"></i> Cloud
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Blog Header -->
    <section class="blog-header">
        <div class="container">
            <h1 class="section-title">My Blog</h1>
            <p class="text-center">Sharing my learning journey in tech</p>
        </div>
    </section>

    <!-- Blog Categories -->
    <section class="blog-categories">
        <div class="container">
            <div class="skills-filter" id="blogCategoryFilter">
                <button class="filter-btn active" data-category="all">All</button>
            </div>
        </div>
    </section>

    <!-- Blog Posts Grid -->
    <section class="blog-posts">
        <div class="container">
            <div class="blog-grid" id="blogPostsGrid"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <h3>KISHORE</h3>
                    <p>Information Technology Student</p>
                </div>
                <div class="footer-links">
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/#about">About</a></li>
                        <li><a href="/#projects">Projects</a></li>
                        <li><a href="/blog.html">Blog</a></li>
                    </ul>
                </div>
                <div class="footer-social" id="footerSocial"></div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 KISHORE. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Back to Top -->
    <button id="backToTop" class="back-to-top"><i class="fas fa-arrow-up"></i></button>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="/js/config.js"></script>
    <script src="/firebase-config.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/blog.js"></script>
    <script src="/js/analytics.js"></script>
</body>
</html>
