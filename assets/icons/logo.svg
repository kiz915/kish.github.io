<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="100" cy="100" r="90" fill="url(#gradient)" />
    
    <!-- Letter K Design -->
    <path d="M65 50 L65 150 M85 100 L120 50 M85 100 L120 150" 
          stroke="white" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none" />
    
    <!-- Decorative Elements -->
    <circle cx="140" cy="70" r="6" fill="white" opacity="0.8" />
    <circle cx="150" cy="100" r="6" fill="white" opacity="0.8" />
    <circle cx="140" cy="130" r="6" fill="white" opacity="0.8" />
    
    <!-- Small Dots -->
    <circle cx="45" cy="45" r="4" fill="white" opacity="0.4" />
    <circle cx="155" cy="55" r="4" fill="white" opacity="0.4" />
    <circle cx="165" cy="160" r="4" fill="white" opacity="0.4" />
</svg>
